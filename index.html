<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioMaster Pro V6 - Persistent Storage & Search</title>
    <style>
        :root {
            --primary: #27ae60; --secondary: #2c3e50; --danger: #e74c3c;
            --accent: #3498db; --star: #f1c40f; --bg: #f4f7f6;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; line-height: 1.5; }
        nav { background: var(--secondary); display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .nav-item { padding: 15px 20px; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-item.active { background: var(--primary); }
        .container { max-width: 900px; margin: 30px auto; padding: 20px; }
        .page { display: none; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .page.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .search-box { margin-bottom: 20px; }
        
        .chapter-box { border: 1px solid #edf2f7; margin-bottom: 12px; border-radius: 12px; overflow: hidden; }
        .chapter-btn { width: 100%; padding: 18px; text-align: left; background: #fff; border: none; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; font-size: 1.1rem; color: var(--secondary); }
        .word-list { display: none; padding: 0 20px 20px; background: #fff; }
        .word-list.open { display: block; border-top: 1px solid #edf2f7; }
        .word-row { padding: 15px 0; border-bottom: 1px solid #f1f5f9; position: relative; }
        .word-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .word-row b { color: var(--primary); font-size: 1.15rem; }
        .star-icon { cursor: pointer; font-size: 1.4rem; color: #ddd; transition: 0.2s; user-select: none; }
        .star-icon.active { color: var(--star); }
        .word-row small { color: #4a5568; display: block; margin-top: 5px; font-size: 0.95rem; line-height: 1.5; }
        
        .quiz-question { font-size: 1.3rem; font-weight: 600; margin: 25px 0; min-height: 110px; color: #1a202c; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1.1rem; outline: none; box-sizing: border-box; transition: 0.2s; }
        input[type="text"]:focus { border-color: var(--primary); }
        
        .feedback { margin: 20px 0; padding: 15px; border-radius: 10px; display: none; font-weight: bold; }
        .feedback.correct { display: block; background: #f0fff4; color: #276749; border: 1px solid #c6f6d5; }
        .feedback.wrong { display: block; background: #fff5f5; color: #9b2c2c; border: 1px solid #fed7d7; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 14px; text-align: left; }
        th { background: #f8fafc; font-size: 0.85rem; color: #718096; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-stop { background: white; color: var(--danger); border: 2px solid var(--danger); }
        .btn-accent { background: var(--accent); color: white; width: 100%; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <div class="nav-item active" onclick="showPage('vocab-page', this)">📖 Dictionary</div>
    <div id="nav-star" class="nav-item" onclick="showPage('star-page', this)">⭐ (0)</div>
    <div class="nav-item" onclick="showPage('quiz-page', this)">🧠 Quiz</div>
    <div id="nav-review" class="nav-item" onclick="showPage('review-page', this)">❌ (0)</div>
</nav>

<div class="container">
    <div id="vocab-page" class="page active">
        <h2 style="color:var(--primary)">🌿 Biology Dictionary</h2>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="🔍 영단어 또는 뜻을 검색해보세요..." oninput="searchDictionary()">
        </div>
        <div id="vocab-content"></div>
    </div>
    
    <div id="star-page" class="page">
        <h2>⭐ Hard Words</h2>
        <div id="star-content"></div>
    </div>
    
    <div id="quiz-page" class="page">
        <div id="quiz-setup">
            <h2>🧠 Quiz Setup</h2>
            <div id="chapter-select-area" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:10px; margin:20px 0;"></div>
            <button class="btn btn-primary" onclick="initQuiz(false)">시작하기</button>
        </div>
        <div id="quiz-run" style="display:none;">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <span id="progress-text" style="font-weight:bold">Problem 1</span>
                <button class="btn btn-stop" style="padding:5px 10px" onclick="stopQuiz()">중단 & 저장</button>
            </div>
            <div class="quiz-question" id="q-text"></div>
            <input type="text" id="user-answer" placeholder="정답 입력..." autocomplete="off">
            <div id="feedback-area" class="feedback"></div>
            <button id="submit-btn" class="btn btn-primary" style="margin-top:20px" onclick="checkAnswer()">확인</button>
            <button id="next-btn" class="btn btn-primary" style="display:none; background:var(--secondary); margin-top:20px" onclick="nextQuestion()">다음 ▶</button>
        </div>
    </div>
    
    <div id="review-page" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>❌ Review Note</h2>
            <button onclick="clearWrongNotes()" class="btn" style="background:var(--danger); color:white; padding:8px 15px">초기화</button>
        </div>
        <div id="review-actions" class="hidden">
            <button class="btn btn-accent" onclick="initQuiz(true)">틀린 문제만 다시 풀기</button>
        </div>
        <div id="review-content"></div>
    </div>
</div>

<script>
const data = {
    "Chapter 1": {

        "Theory": "A widely accepted explanatory idea that is broader in scope than a hypothesis, generates new hypotheses, and is supported by a large body of evidence.",

    },
    "Chapter 3": {

    "Chapter 9": {

        "Genotype": "The genetic makeup of an organism.",
        "Testcross": "The mating between an individual of unknown genotype and an individual that is homozygous recessive for that same character.",
        "Codominant": "Expressing two different alleles of a gene in a heterozygote.",
        "Pleiotropy": "The control of more than one phenotypic character by a single gene.",
        "Polygenic inheritance": "The additive effect of two or more genes on a single phenotypic character.",
        "Epigenetic inheritance": "Inheritance of traits transmitted by mechanisms not directly involving the nucleotide sequence, such as chemical modification of DNA/histones."
    },
    "Chapter 10": {
        "DNA polymerase": "An enzyme that assembles DNA nucleotides into polynucleotides using a preexisting strand of DNA as a template.",
        "Transcription": "The synthesis of RNA on a DNA template.",

        "Recombinant DNA": "A DNA molecule carrying genes derived from two or more sources, often from different species.",
        "Plasmid": "A small ring of self-replicating DNA separate from the larger chromosome(s), most frequently derived from bacteria.",
        "DNA cloning": "The production of many identical copies of a specific segment of DNA.",
        "Restriction enzyme": "A bacterial enzyme that cuts up foreign DNA at one very specific nucleotide sequence; used in DNA technology.",
        "DNA ligase": "An enzyme essential for DNA replication that creates new chemical bonds between adjacent DNA nucleotides to 'paste' DNA fragments.",

// 💾 저장 관련 수정된 변수 선언
let quizList = [];
let currentIdx = 0;
let wrongNotes = JSON.parse(localStorage.getItem('bio_wrongNotes')) || [];
let starWords = JSON.parse(localStorage.getItem('bio_starWords')) || [];
let errorHistory = {}; 
let isReviewQuiz = false;

// 💾 로컬 스토리지 저장 함수
function saveToLocal() {
    localStorage.setItem('bio_wrongNotes', JSON.stringify(wrongNotes));
    localStorage.setItem('bio_starWords', JSON.stringify(starWords));
}

function init() {
    const vocabBox = document.getElementById('vocab-content');
    const selectBox = document.getElementById('chapter-select-area');
    
    // 초기 뱃지 숫자 로드
    updateReviewCount();
    document.getElementById('nav-star').textContent = `⭐ (${starWords.length})`;

    for (let chapter in data) {
        const div = document.createElement('div');
        div.className = 'chapter-box';
        div.innerHTML = `<button class="chapter-btn" onclick="this.nextElementSibling.classList.toggle('open')">${chapter} <span>▼</span></button>
            <div class="word-list">${Object.entries(data[chapter]).map(([w, d]) => `
                <div class="word-row">
                    <div class="word-header">
                        <b>${w}</b>
                        <span class="star-icon ${starWords.includes(w) ? 'active' : ''}" onclick="toggleStar('${w}')" id="star-${w.replace(/\s+/g, '')}">★</span>
                    </div>
                    <small>${d}</small>
                </div>`).join('')}</div>`;
        vocabBox.appendChild(div);
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" class="chap-chk" value="${chapter}"> ${chapter}`;
        selectBox.appendChild(label);
    }
    document.getElementById('user-answer').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter') (document.getElementById('submit-btn').style.display !== 'none') ? checkAnswer() : nextQuestion();
    });
}

// 🔍 검색 함수 추가
function searchDictionary() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const chapters = document.querySelectorAll('#vocab-content .chapter-box');

    chapters.forEach(chapter => {
        const wordRows = chapter.querySelectorAll('.word-row');
        let hasMatch = false;

        wordRows.forEach(row => {
            const text = row.innerText.toLowerCase();
            if (text.includes(query)) {
                row.style.display = 'block';
                hasMatch = true;
            } else {
                row.style.display = 'none';
            }
        });

        const wordList = chapter.querySelector('.word-list');
        
        // 검색어가 있을 경우
        if (query.trim() !== '') {
            if (hasMatch) {
                chapter.style.display = 'block';
                wordList.classList.add('open'); // 일치하는 단어가 있으면 챕터 펼치기
            } else {
                chapter.style.display = 'none'; // 일치하는 게 없으면 챕터 숨기기
            }
        } else {
            // 검색어가 없을 경우 (초기화)
            chapter.style.display = 'block';
            wordList.classList.remove('open');
            wordRows.forEach(row => row.style.display = 'block');
        }
    });
}

function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(el) el.classList.add('active');
    if(id === 'star-page') renderStars();
    if(id === 'review-page') updateReviewPage();
}

function toggleStar(word) {
    const idx = starWords.indexOf(word);
    if (idx === -1) starWords.push(word);
    else starWords.splice(idx, 1);
    
    saveToLocal(); // ⭐ 로컬 저장
    updateStarUI(word);
    document.getElementById('nav-star').textContent = `⭐ (${starWords.length})`;
    if(document.getElementById('star-page').classList.contains('active')) renderStars();
}

function updateStarUI(word) {
    const stars = document.querySelectorAll(`[id="star-${word.replace(/\s+/g, '')}"]`);
    stars.forEach(s => {
        if (starWords.includes(word)) s.classList.add('active');
        else s.classList.remove('active');
    });
}

function renderStars() {
    const container = document.getElementById('star-content');
    if (!starWords.length) return container.innerHTML = "<p style='text-align:center; padding:50px; color:#999;'>별표된 단어가 없습니다.</p>";
    let html = "";
    starWords.forEach(word => {
        let def = ""; for (let ch in data) { if(data[ch][word]) def = data[ch][word]; }
        html += `<div class="word-row">
                    <div class="word-header">
                        <b>${word}</b>
                        <span class="star-icon active" onclick="toggleStar('${word}')">★</span>
                    </div>
                    <small>${def}</small>
                </div>`;
    });
    container.innerHTML = html;
}
    
function initQuiz(fromReview = false) {
    isReviewQuiz = fromReview;
    if (fromReview) {
        if (!wrongNotes || wrongNotes.length === 0) return alert("틀린 문제가 없습니다!");
        // 오답 리스트를 퀴즈용으로 변환
        quizList = wrongNotes.map(n => ({ q: n.q, a: n.a, ch: n.ch }));
        
        const quizNavLink = document.querySelectorAll('.nav-item')[2]; // 🧠 Quiz 메뉴
        showPage('quiz-page', quizNavLink);
    } else {
        const selected = Array.from(document.querySelectorAll('.chap-chk:checked')).map(c => c.value);
        if (!selected.length) return alert("단원을 선택하세요!");
        quizList = [];
        selected.forEach(ch => { 
            for (let word in data[ch]) quizList.push({ q: data[ch][word], a: word, ch: ch }); 
        });
    }
    
    quizList.sort(() => Math.random() - 0.5);
    currentIdx = 0;

    // 설정창 숨기고 퀴즈 실행창 보이기
    document.getElementById('quiz-setup').style.display = 'none';
    document.getElementById('quiz-run').style.display = 'block';
    
    renderQuestion();
}

function renderQuestion() {
    if (currentIdx >= quizList.length) return finishQuiz();
    const item = quizList[currentIdx];
    document.getElementById('progress-text').textContent = (isReviewQuiz ? "[복습] " : "") + `Problem ${currentIdx + 1} / ${quizList.length}`;
    document.getElementById('q-text').textContent = item.q;
    document.getElementById('user-answer').value = "";
    document.getElementById('user-answer').disabled = false;
    document.getElementById('feedback-area').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'block';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('user-answer').focus();
}

function checkAnswer() {
    const userAns = document.getElementById('user-answer').value.trim().toLowerCase();
    const realWord = quizList[currentIdx].a;
    const realAns = realWord.toLowerCase();
    const feedback = document.getElementById('feedback-area');
    feedback.style.display = 'block';

    if (userAns === realAns) {
        feedback.textContent = "Correct! ✨";
        feedback.className = "feedback correct";
        errorHistory[realWord] = 0;
        if(isReviewQuiz) { 
            wrongNotes = wrongNotes.filter(n => n.a.toLowerCase() !== realAns);
            saveToLocal(); // 💾 복습 성공 시 저장
        }
    } else {
        feedback.innerHTML = `Wrong! ❌ Answer: <b>${realWord}</b>`;
        feedback.className = "feedback wrong";
        if (!wrongNotes.some(n => n.a === realWord)) {
            wrongNotes.push({ ch: quizList[currentIdx].ch, q: quizList[currentIdx].q, a: realWord, u: userAns || "(None)" });
            saveToLocal(); // 💾 오답 발생 시 저장
        }
        errorHistory[realWord] = (errorHistory[realWord] || 0) + 1;
        if (errorHistory[realWord] >= 3 && !starWords.includes(realWord)) {
            toggleStar(realWord);
            feedback.innerHTML += `<br><span style="color:var(--star); font-size:0.8rem">⚠️ 3회 오답으로 ⭐ 추가됨!</span>`;
        }
    }
    updateReviewCount();
    document.getElementById('user-answer').disabled = true;
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() { currentIdx++; renderQuestion(); }
function stopQuiz() { if(confirm("중단하고 결과를 저장할까요?")) finishQuiz(); }
function finishQuiz() {
    updateReviewPage();
    showPage('review-page', document.getElementById('nav-review'));
    document.getElementById('quiz-run').style.display = 'none';
    document.getElementById('quiz-setup').style.display = 'block';
}
function updateReviewCount() { document.getElementById('nav-review').textContent = `❌ (${wrongNotes.length})`; }
function updateReviewPage() {
    const container = document.getElementById('review-content');
    const actions = document.getElementById('review-actions');
    if (!wrongNotes.length) {
        container.innerHTML = "<p style='text-align:center; padding:50px; color:#999;'>기록된 오답이 없습니다.</p>";
        actions.classList.add('hidden'); return;
    }
    actions.classList.remove('hidden');
    let html = `<table><tr><th>Chapter</th><th>Question</th><th>Answer</th></tr>`;
    wrongNotes.forEach(n => { html += `<tr><td>${n.ch}</td><td><small>${n.q}</small></td><td><b>${n.a}</b></td></tr>`; });
    container.innerHTML = html + `</table>`;
}
function clearWrongNotes() { if(confirm("초기화할까요?")) { wrongNotes = []; saveToLocal(); updateReviewCount(); updateReviewPage(); } }

init();
</script>
</body>
</html>
