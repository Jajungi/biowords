<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioMaster Pro V4 - Full Course</title>
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #2c3e50;
            --danger: #e74c3c;
            --bg: #f4f7f6;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; line-height: 1.5; }
        nav { background: var(--secondary); display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .nav-item { padding: 15px 25px; color: white; cursor: pointer; font-weight: bold; }
        .nav-item.active { background: var(--primary); }
        .container { max-width: 900px; margin: 30px auto; padding: 20px; }
        .page { display: none; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .page.active { display: block; }
        .chapter-box { border: 1px solid #edf2f7; margin-bottom: 12px; border-radius: 12px; overflow: hidden; }
        .chapter-btn { width: 100%; padding: 18px; text-align: left; background: #fff; border: none; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; color: var(--secondary); }
        .word-list { display: none; padding: 0 20px 20px; background: #fff; }
        .word-list.open { display: block; border-top: 1px solid #edf2f7; }
        .word-row { padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .word-row b { color: var(--primary); font-size: 1.1rem; display: block; }
        .word-row small { color: #555; display: block; margin-top: 4px; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .quiz-question { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; min-height: 80px; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .feedback { margin: 20px 0; padding: 15px; border-radius: 10px; display: none; }
        .feedback.correct { display: block; background: #f0fff4; color: #276749; }
        .feedback.wrong { display: block; background: #fff5f5; color: #9b2c2c; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; font-size: 0.9rem; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-stop { background: white; color: var(--danger); border: 1px solid var(--danger); }
    </style>
</head>
<body>

<nav>
    <div class="nav-item active" onclick="showPage('vocab-page', this)">Dictionary</div>
    <div class="nav-item" onclick="showPage('quiz-page', this)">Live Quiz</div>
    <div id="nav-review" class="nav-item" onclick="showPage('review-page', this)">Review (0)</div>
</nav>

<div class="container">
    <div id="vocab-page" class="page active">
        <h2>🌿 Biology Vocabulary Master (Ch 1-12)</h2>
        <div id="vocab-content"></div>
    </div>

    <div id="quiz-page" class="page">
        <div id="quiz-setup">
            <h2>🧠 Quiz Setup</h2>
            <div id="chapter-select-area" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0;"></div>
            <button class="btn btn-primary" onclick="initQuiz()">Start Quiz</button>
        </div>
        <div id="quiz-run" style="display:none;">
            <div class="quiz-header">
                <span id="progress-text">Problem 1 / 10</span>
                <button class="btn btn-stop" onclick="confirmStopQuiz()">Stop</button>
            </div>
            <div class="quiz-question" id="q-text"></div>
            <input type="text" id="user-answer" placeholder="Type the word here..." autocomplete="off">
            <div id="feedback-area" class="feedback"></div>
            <button id="submit-btn" class="btn btn-primary" onclick="checkAnswer()" style="margin-top:20px;">Check Answer</button>
            <button id="next-btn" class="btn btn-primary" style="display:none; background:var(--secondary); margin-top:20px;" onclick="nextQuestion()">Next ▶</button>
        </div>
    </div>

    <div id="review-page" class="page">
        <h2>❌ Incorrect Notes</h2>
        <div id="review-content"></div>
    </div>
</div>

<script>
const data = {
    "Chapter 1": {
        "Hypothesis": "A tentative, testable explanation for a specific observation or phenomenon.",
        "Theory": "A comprehensive and well-substantiated explanation of some aspect of the natural world based on a body of evidence.",
        "Independent variable": "The factor that is manipulated by the researcher to observe its effect in an experiment.",
        "Dependent variable": "The factor being measured and observed; it changes in response to the independent variable.",
        "Gene": "A specific sequence of DNA that acts as a basic unit of heredity by coding for a particular functional product.",
        "Natural selection": "The process where organisms with favorable traits are more likely to survive and reproduce in their environment.",
        "Evolution": "The cumulative change in the genetic characteristics of a population or species over successive generations.",
        "Placebo": "An inactive substance or treatment used as a control in an experiment to test the effectiveness of a real drug.",
        "Pseudoscience": "Claims, beliefs, or practices that are presented as scientific but lack supporting evidence or a scientific basis."
    },
    "Chapter 2": {
        "Trace elements": "Chemical elements required by living organisms in extremely small amounts for proper physiological function.",
        "Isotope": "Atoms of the same element that have the same number of protons but different numbers of neutrons.",
        "Ionic bond": "A chemical bond formed by the electrostatic attraction between oppositely charged ions through electron transfer.",
        "Covalent bond": "A strong chemical bond formed when two atoms share one or more pairs of valence electrons.",
        "Hydrogen bond": "A weak attraction between a slightly positive hydrogen atom and a slightly negative atom of another molecule.",
        "Cohesion": "The tendency of molecules of the same kind to stick together, often due to hydrogen bonding.",
        "Evaporative cooling": "The process in which the surface of an object becomes cooler during evaporation as the hottest molecules leave.",
        "Buffers": "Substances that minimize changes in pH by accepting or donating H+ ions as needed.",
        "Proton": "A subatomic particle with a single positive electrical charge, found in the nucleus of an atom.",
        "Neutron": "A subatomic particle having no electrical charge, found in the nucleus of an atom.",
        "Compounds": "A substance consisting of two or more different elements combined in a fixed ratio."
    },
    "Chapter 3": {
        "Functional groups": "Specific configurations of atoms commonly attached to the carbon skeletons of organic molecules and involved in chemical reactions.",
        "Hydrolysis": "A chemical reaction that breaks bonds between two molecules by the addition of water; essential for digestion.",
        "Dehydration reaction": "A chemical reaction in which two molecules become covalently bonded to each other with the removal of a water molecule.",
        "Isomer": "Organic compounds with the same molecular formula but different structures and therefore different properties.",
        "Glycogen": "An extensively branched glucose storage polysaccharide found in liver and muscle cells of animals.",
        "Hydrophobic": "Referring to the property of 'water-fearing' molecules that do not dissolve in water.",
        "Hydrophilic": "Referring to 'water-loving' molecules that are polar or charged and dissolve readily in water.",
        "Peptide bond": "The covalent bond between two amino acid units, formed by a dehydration reaction.",
        "Double helix": "The form of native DNA, referring to its two adjacent polynucleotide strands interwound into a spiral shape."
    },
    "Chapter 4": {
        "Cell theory": "The theory that all living things are composed of cells and that all cells come from other cells.",
        "Plasma membrane": "The membrane at the boundary of every cell that acts as a selective barrier, regulating the cell's chemical composition.",
        "Cytosol": "The semifluid portion of the cytoplasm in which organelles and other components are suspended.",
        "Nucleus": "The genetic control center of a eukaryotic cell, containing the cell's DNA.",
        "Phospholipid bilayer": "A double layer of phospholipids that makes up plasma and organelle membranes.",
        "Fluid mosaic": "A description of membrane structure, depicting it as a surface of diverse protein molecules embedded in a fluid phospholipid bilayer.",
        "Extracellular matrix": "A meshwork surrounding animal cells, consisting of glycoproteins and polysaccharides synthesized and secreted by the cells.",
        "Endoplasmic reticulum": "An extensive membranous network in eukaryotic cells, continuous with the outer nuclear membrane.",
        "Golgi apparatus": "An organelle consisting of stacks of membranous sacs that modify, store, and ship products of the endoplasmic reticulum.",
        "Cytoskeleton": "A network of protein fibers in the cytoplasm of a eukaryotic cell; includes microfilaments, intermediate filaments, and microtubules.",
        "Flagella": "Long cellular appendages specialized for locomotion, found in some eukaryotic and prokaryotic cells.",
        "Cilia": "Short cellular appendages specialized for locomotion or for moving fluid past the cell."
    },
    "Chapter 5": {
        "Calorie": "The amount of energy that raises the temperature of 1 gram of water by 1 degree Celsius.",
        "ATP": "Adenosine triphosphate; the main energy source for cells, releasing energy when its phosphate bonds are broken.",
        "Enzymes": "Macromolecules, usually proteins, that serve as biological catalysts, changing the rate of a chemical reaction without being consumed.",
        "Metabolism": "The total of all chemical reactions in an organism.",
        "Activation energy": "The amount of energy that reactants must absorb before a chemical reaction will start.",
        "Induced fit": "The change in shape of the active site of an enzyme so that it binds more snugly to the substrate.",
        "Enzyme inhibitors": "Chemicals that interfere with an enzyme's activity by blocking the active site or changing its shape.",
        "Facilitated diffusion": "The passage of a substance through a specific transport protein across a biological membrane down its concentration gradient.",
        "Osmosis": "The diffusion of free water across a selectively permeable membrane.",
        "Active transport": "The movement of a substance across a biological membrane against its concentration gradient, requiring energy (ATP)."
    },
    "Chapter 6": {
        "Photosynthesis": "The process by which plants, algae, and some bacteria transform light energy into chemical energy stored in sugars.",
        "Autotroph": "An organism that makes its own food from inorganic ingredients, such as plants.",
        "Heterotroph": "An organism that cannot make its own organic food molecules and must obtain them by consuming other organisms.",
        "Cellular respiration": "The aerobic harvesting of chemical energy from organic fuel molecules.",
        "Glycolysis": "A series of reactions that ultimately splits glucose into two molecules of pyruvate; the first stage of cellular respiration.",
        "Citric acid cycle": "The metabolic cycle that completes the breakdown of glucose molecules to carbon dioxide; the second stage of cellular respiration.",
        "Electron transport": "The process in which electrons are passed from one carrier to another, releasing energy used to make ATP.",
        "Electron transport chain": "A series of electron carrier molecules that shuttle electrons during the final stage of cellular respiration.",
        "ATP synthase": "A cluster of several membrane proteins that function in chemiosmosis with adjacent electron transport chains, using the energy of a hydrogen ion gradient to make ATP.",
        "Fermentation": "The anaerobic harvest of food energy, typically involving glycolysis and a pathway to recycle NAD+."
    },
    "Chapter 7": {
        "Chloroplast": "An organelle found in plants and photosynthetic protists that absorbs sunlight and uses it to drive the synthesis of organic compounds.",
        "Stomata": "Pores surrounded by guard cells in the epidermis of a leaf; when open, CO2 enters and water and O2 exit.",
        "Stroma": "The thick fluid of the chloroplast surrounding the thylakoid membrane.",
        "Thylakoids": "Flattened membranous sacs inside a chloroplast; their membranes contain chlorophyll and the molecular complexes of the light reactions.",
        "Light reaction": "The first two stages in photosynthesis; the steps in which solar energy is absorbed and converted to chemical energy in the form of ATP and NADPH.",
        "Calvin cycle": "The second stage of photosynthesis; a cyclic series of chemical reactions that occurs in the stroma of a chloroplast, using CO2 and ATP/NADPH to make sugar.",
        "NADPH": "An electron carrier involved in photosynthesis, which provides the high-energy electrons for the reduction of carbon dioxide to sugar in the Calvin cycle.",
        "Electromagnetic spectrum": "The entire range of radiation, from the very short wavelengths of gamma rays to the very long wavelengths of radio signals.",
        "Photon": "A fixed quantity of light energy; the shorter the wavelength of light, the greater the energy of a photon."
    },
    "Chapter 8": {
        "Chromosome": "A gene-carrying structure found in the nucleus of a eukaryotic cell and most visible during mitosis and meiosis.",
        "Asexual reproduction": "The creation of genetically identical offspring by a single parent, without the participation of sperm and egg.",
        "Clone": "As a verb, to produce genetically identical copies of a cell, organism, or DNA molecule.",
        "Gamete": "A sex cell; a haploid egg or sperm.",
        "Chromatin": "The combination of DNA and proteins that constitutes eukaryotic chromosomes.",
        "Histone": "A small protein molecule associated with DNA and important in DNA packing in the eukaryotic chromosome.",
        "Nucleosome": "The bead-like unit of DNA packing in a eukaryotic cell; consists of DNA wound around a protein core made up of eight histone molecules.",
        "Centromere": "The region of a duplicated chromosome where two sister chromatids are joined and where spindle microtubules attach during mitosis and meiosis.",
        "Cell cycle": "An ordered sequence of events that extends from the time a eukaryotic cell is first formed from a dividing parent cell until its own division into two cells.",
        "Mitosis": "The division of a single nucleus into two genetically identical daughter nuclei.",
        "Cytokinesis": "The division of the cytoplasm to form two separate daughter cells; usually occurs during telophase of mitosis.",
        "Metastasis": "The spread of cancer cells beyond their original site."
    },
    "Chapter 9": {
        "Character": "A heritable feature that varies among individuals within a population, such as flower color in pea plants.",
        "Trait": "A variant of a character found within a population, such as purple or white flowers in pea plants.",
        "Hybrid": "The offspring of parents of two different species or of two different variants of one species; as an adjective, heterozygous.",
        "Cross": "A mating of two sexually reproducing individuals; often used to describe a genetics experiment.",
        "Homozygous": "Having two identical alleles for a given gene.",
        "Heterozygous": "Having two different alleles for a given gene.",
        "Dominant allele": "The allele that determines the phenotype of a gene when the individual is heterozygous for that gene.",
        "Recessive allele": "An allele that has no noticeable effect on the phenotype of a gene when the individual is heterozygous for that gene.",
        "Punnett square": "A diagram used in the study of inheritance to show the results of random fertilization.",
        "Phenotype": "The expressed traits of an organism.",
        "Genotype": "The genetic makeup of an organism.",
        "Test cross": "The mating between an individual of unknown genotype for a particular character and an individual that is homozygous recessive for that same character.",
        "Codominance": "Inheritance pattern in which a heterozygote expresses the distinct trait of both alleles.",
        "Pleiotropy": "The control of more than one phenotypic character by a single gene.",
        "Polygenic inheritance": "The additive effect of two or more gene loci on a single phenotypic character.",
        "Epigenetic inheritance": "The inheritance of traits transmitted by mechanisms not directly involving the nucleotide sequence of a genome, such as the chemical modification of histone proteins or DNA bases."
    },
    "Chapter 10": {
        "DNA polymerase": "An enzyme that assembles DNA nucleotides into polynucleotides using a preexisting strand of DNA as a template.",
        "Transcription": "The synthesis of RNA on a DNA template.",
        "Translation": "The synthesis of a polypeptide using the genetic information encoded in an mRNA molecule.",
        "Codon": "A three-nucleotide sequence in mRNA that specifies a particular amino acid or polypeptide termination signal; the basic unit of the genetic code.",
        "Genetic code": "The set of rules that dictates the correspondence between RNA codons in an mRNA molecule and amino acids in a protein.",
        "RNA polymerase": "An enzyme that links together the growing chain of RNA nucleotides during transcription, using a DNA strand as a template.",
        "Promoter": "A specific nucleotide sequence in DNA located at the start of a gene that is the binding site for RNA polymerase and the place where transcription begins."
    },
    "Chapter 11": {
        "Operon": "A unit of genetic regulation common in prokaryotes; a cluster of genes with related functions, along with the promoter and operator that control their transcription.",
        "Transcription factors": "In the eukaryotic cell, a protein that functions in initiating or regulating transcription; include bind to DNA or to other proteins that bind to DNA.",
        "Enhancer": "A eukaryotic DNA sequence that helps stimulate the transcription of a gene at some distance from it.",
        "Alternative RNA splicing": "A type of eukaryotic gene regulation at the RNA-processing level in which different mRNA molecules are produced from the same primary transcript.",
        "microRNAs": "A small, single-stranded RNA molecule that associates with one or more proteins in a complex that can degrade or prevent translation of an mRNA with a complementary sequence.",
        "RNA interference": "A biotechnology technique used to silence the expression of specific genes, using synthetic RNA molecules that are complementary to the mRNA sequence.",
        "Signal transduction pathway": "In cell biology, a series of molecular changes that converts a signal on a target cell's surface to a specific response inside the cell.",
        "Homeotic genes": "A master control gene that determines the identity of a body structure of a developing organism, presumably by controlling the developmental fate of groups of cells.",
        "DNA microarray": "A glass slide containing thousands of different kinds of single-stranded DNA fragments arranged in a grid; used to detect and measure the expression of many genes at once.",
        "Complementary DNAs (cDNAs)": "A DNA molecule made in vitro using mRNA as a template and the enzyme reverse transcriptase.",
        "Nuclear transplantation": "A technique in which the nucleus of one cell is placed into another cell that has had its nucleus removed or destroyed.",
        "Reproductive cloning": "Using a somatic cell from a multicellular organism to make one or more genetically identical individuals.",
        "Embryonic stem cell": "Cell in the early animal embryo that differentiates during development to give rise to all the specialized cell types in the body.",
        "Oncogene": "A cancer-causing gene; usually contributes to malignancy by abnormally enhancing the amount or activity of a growth factor made by the cell.",
        "Tumor-suppressor genes": "A gene whose product inhibits cell division, thereby preventing uncontrolled cell growth."
    },
    "Chapter 12": {
        "Genetically modified organisms": "An organism that has acquired one or more genes by artificial means.",
        "Transgenic organism": "An organism that contains genes from another species, typically of another genus.",
        "Recombinant DNA": "A DNA molecule carrying genes derived from two or more sources.",
        "Plasmids": "A small ring of self-replicating DNA separate from the chromosome(s), commonly used in genetic engineering as vectors to carry genes.",
        "DNA cloning": "The production of many identical copies of a specific segment of DNA.",
        "Restriction enzyme": "A bacterial enzyme that cuts up foreign DNA (at specific restriction sites), thus protecting bacteria against intruding DNA from phages and other organisms.",
        "DNA ligase": "An enzyme, essential for DNA replication, that catalyzes the covalent bonding of adjacent DNA polynucleotide strands.",
        "CRISPR-Cas9 system": "A technique for editing genes in living cells, involving a bacterial protein called Cas9 associated with a guide RNA complementary to a gene sequence of interest."
    }
};

let quizList = [];
let currentIdx = 0;
let wrongNotes = [];

function init() {
    const vocabBox = document.getElementById('vocab-content');
    const selectBox = document.getElementById('chapter-select-area');
    for (let chapter in data) {
        const div = document.createElement('div');
        div.className = 'chapter-box';
        div.innerHTML = `<button class="chapter-btn" onclick="this.nextElementSibling.classList.toggle('open')">${chapter} <span>▼</span></button>
            <div class="word-list">${Object.entries(data[chapter]).map(([w, d]) => `<div class="word-row"><b>${w}</b><small>${d}</small></div>`).join('')}</div>`;
        vocabBox.appendChild(div);
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" class="chap-chk" value="${chapter}"> ${chapter}`;
        selectBox.appendChild(label);
    }
    document.getElementById('user-answer').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkAnswer(); });
}

function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}

function initQuiz() {
    const selected = Array.from(document.querySelectorAll('.chap-chk:checked')).map(c => c.value);
    if (!selected.length) return alert("Select at least one chapter!");
    quizList = [];
    selected.forEach(ch => { for (let word in data[ch]) quizList.push({ q: data[ch][word], a: word, ch: ch }); });
    quizList.sort(() => Math.random() - 0.5);
    currentIdx = 0;
    document.getElementById('quiz-setup').style.display = 'none';
    document.getElementById('quiz-run').style.display = 'block';
    renderQuestion();
}

function renderQuestion() {
    if (currentIdx >= quizList.length) return finishQuiz();
    const item = quizList[currentIdx];
    document.getElementById('progress-text').textContent = `Problem ${currentIdx + 1} / ${quizList.length}`;
    document.getElementById('q-text').textContent = item.q;
    document.getElementById('user-answer').value = "";
    document.getElementById('user-answer').disabled = false;
    document.getElementById('feedback-area').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'block';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('user-answer').focus();
}

function checkAnswer() {
    if (document.getElementById('submit-btn').style.display === 'none') return nextQuestion();
    const userAns = document.getElementById('user-answer').value.trim().toLowerCase();
    const realAns = quizList[currentIdx].a.toLowerCase();
    const feedback = document.getElementById('feedback-area');
    feedback.style.display = 'block';
    if (userAns === realAns) {
        feedback.textContent = "Correct! ✨";
        feedback.className = "feedback correct";
    } else {
        feedback.innerHTML = `Wrong! ❌ Answer: <b>${quizList[currentIdx].a}</b>`;
        feedback.className = "feedback wrong";
        wrongNotes.push({ ch: quizList[currentIdx].ch, q: quizList[currentIdx].q, a: quizList[currentIdx].a, u: userAns || "(Empty)" });
        updateReviewCount();
    }
    document.getElementById('user-answer').disabled = true;
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() { currentIdx++; renderQuestion(); }

function confirmStopQuiz() { if(confirm("Stop quiz?")) { document.getElementById('quiz-run').style.display = 'none'; document.getElementById('quiz-setup').style.display = 'block'; } }

function finishQuiz() {
    alert("Quiz Finished!");
    updateReviewPage();
    showPage('review-page', document.getElementById('nav-review'));
    document.getElementById('quiz-run').style.display = 'none';
    document.getElementById('quiz-setup').style.display = 'block';
}

function updateReviewCount() { document.getElementById('nav-review').textContent = `Review (${wrongNotes.length})`; }

function updateReviewPage() {
    const container = document.getElementById('review-content');
    if (!wrongNotes.length) return container.innerHTML = "<p>Perfect! No mistakes.</p>";
    let html = `<table><tr><th>Chapter</th><th>Question</th><th>Your Answer</th><th>Correct</th></tr>`;
    wrongNotes.forEach(n => { html += `<tr><td>${n.ch}</td><td><small>${n.q}</small></td><td style="color:red">${n.u}</td><td style="color:green"><b>${n.a}</b></td></tr>`; });
    container.innerHTML = html + `</table>`;
}

init();
</script>
</body>
</html>
