<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioMaster Pro V5</title>
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #2c3e50;
            --danger: #e74c3c;
            --accent: #3498db;
            --bg: #f4f7f6;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; line-height: 1.5; }
        
        /* Navigation */
        nav { background: var(--secondary); display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-item { padding: 15px 25px; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-item.active { background: var(--primary); }

        .container { max-width: 900px; margin: 30px auto; padding: 20px; }
        .page { display: none; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .page.active { display: block; animation: fadeIn 0.4s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Vocabulary Accordion */
        .chapter-box { border: 1px solid #edf2f7; margin-bottom: 12px; border-radius: 12px; overflow: hidden; }
        .chapter-btn { width: 100%; padding: 18px; text-align: left; background: #fff; border: none; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; font-size: 1.1rem; color: var(--secondary); }
        .word-list { display: none; padding: 0 20px 20px; background: #fff; }
        .word-list.open { display: block; border-top: 1px solid #edf2f7; }
        .word-row { padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .word-row b { color: var(--primary); font-size: 1.1rem; display: block; }
        .word-row small { color: #555; display: block; margin-top: 4px; font-size: 0.95rem; }

        /* Quiz UI */
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .quiz-question { font-size: 1.3rem; font-weight: 600; margin: 25px 0; min-height: 100px; color: #2d3748; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 1.1rem; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }
        
        .feedback { margin: 20px 0; padding: 15px; border-radius: 10px; display: none; font-weight: bold; }
        .feedback.correct { display: block; background: #f0fff4; color: #276749; border: 1px solid #c6f6d5; }
        .feedback.wrong { display: block; background: #fff5f5; color: #9b2c2c; border: 1px solid #fed7d7; }

        /* Review Table */
        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        th { background: #f8fafc; }

        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-stop { background: white; color: var(--danger); border: 2px solid var(--danger); }
        .btn-accent { background: var(--accent); color: white; width: 100%; margin-top: 10px; }
        .btn-danger { background: var(--danger); color: white; padding: 8px 15px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <div class="nav-item active" onclick="showPage('vocab-page', this)">Dictionary</div>
    <div class="nav-item" onclick="showPage('quiz-page', this)">Live Quiz</div>
    <div id="nav-review" class="nav-item" onclick="showPage('review-page', this)">Review (0)</div>
</nav>

<div class="container">
    
    <div id="vocab-page" class="page active">
        <h2 style="color:var(--primary)">🌿 Biology Dictionary</h2>
        <div id="vocab-content"></div>
    </div>

    <div id="quiz-page" class="page">
        <div id="quiz-setup">
            <h2>🧠 Quiz Setup</h2>
            <p>테스트할 단원을 선택하세요:</p>
            <div id="chapter-select-area" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:10px; margin:20px 0;"></div>
            <button class="btn btn-primary" onclick="initQuiz(false)">선택 단원 퀴즈 시작</button>
        </div>

        <div id="quiz-run" style="display:none;">
            <div class="quiz-header">
                <span id="progress-text" style="font-weight:bold; color:var(--secondary)">Problem 1 / 10</span>
                <button class="btn btn-stop" onclick="stopQuiz()">퀴즈 중단 & 오답 저장</button>
            </div>
            <div class="quiz-question" id="q-text"></div>
            <input type="text" id="user-answer" placeholder="영단어를 입력하세요..." autocomplete="off">
            <div id="feedback-area" class="feedback"></div>
            <button id="submit-btn" class="btn btn-primary" onclick="checkAnswer()">정답 확인 (Enter)</button>
            <button id="next-btn" class="btn btn-primary" style="display:none; background:var(--secondary);" onclick="nextQuestion()">다음 문제 ▶</button>
        </div>
    </div>

    <div id="review-page" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0">❌ Incorrect Notes</h2>
            <button class="btn btn-danger" onclick="clearWrongNotes()">초기화</button>
        </div>
        
        <div id="review-actions" class="hidden">
            <button class="btn btn-accent" onclick="initQuiz(true)">🔥 오답들만 모아서 다시 퀴즈 풀기</button>
            <p style="text-align:center; font-size:0.9rem; color:#666;">오답 퀴즈는 위 리스트에 있는 단어들로만 구성됩니다.</p>
        </div>

        <div id="review-content" class="table-wrapper">
            <p style="text-align:center; padding:50px; color:#999;">틀린 문제가 없습니다.</p>
        </div>
    </div>

</div>

<script>
// 데이터 (기존 1~12단원 데이터 사용)
const data = {
    "Chapter 1": { "Hypothesis": "A tentative, testable explanation for a specific observation or phenomenon.", "Theory": "A comprehensive and well-substantiated explanation of some aspect of the natural world based on a body of evidence.", "Independent variable": "The factor that is manipulated by the researcher to observe its effect in an experiment.", "Dependent variable": "The factor being measured and observed; it changes in response to the independent variable.", "Gene": "A specific sequence of DNA that acts as a basic unit of heredity by coding for a particular functional product.", "Natural selection": "The process where organisms with favorable traits are more likely to survive and reproduce in their environment.", "Evolution": "The cumulative change in the genetic characteristics of a population or species over successive generations.", "Placebo": "An inactive substance or treatment used as a control in an experiment to test the effectiveness of a real drug.", "Pseudoscience": "Claims, beliefs, or practices that are presented as scientific but lack supporting evidence or a scientific basis." },
    "Chapter 2": { "Trace elements": "Chemical elements required by living organisms in extremely small amounts for proper physiological function.", "Isotope": "Atoms of the same element that have the same number of protons but different numbers of neutrons.", "Ionic bond": "A chemical bond formed by the electrostatic attraction between oppositely charged ions through electron transfer.", "Covalent bond": "A strong chemical bond formed when two atoms share one or more pairs of valence electrons.", "Hydrogen bond": "A weak attraction between a slightly positive hydrogen atom and a slightly negative atom of another molecule.", "Cohesion": "The tendency of molecules of the same kind to stick together, often due to hydrogen bonding.", "Evaporative cooling": "The process in which the surface of an object becomes cooler during evaporation as the hottest molecules leave.", "Buffers": "Substances that minimize changes in pH by accepting or donating H+ ions as needed.", "Proton": "A subatomic particle with a single positive electrical charge, found in the nucleus of an atom.", "Neutron": "A subatomic particle having no electrical charge, found in the nucleus of an atom.", "Compounds": "A substance consisting of two or more different elements combined in a fixed ratio." },
    "Chapter 3": { "Functional groups": "Specific configurations of atoms commonly attached to the carbon skeletons of organic molecules and involved in chemical reactions.", "Hydrolysis": "A chemical reaction that breaks bonds between two molecules by the addition of water.", "Dehydration reaction": "A chemical reaction in which two molecules become covalently bonded with the removal of a water molecule.", "Isomer": "Compounds with the same molecular formula but different structures.", "Glycogen": "A glucose storage polysaccharide found in liver and muscle cells of animals.", "Hydrophobic": "Water-fearing; molecules that do not dissolve in water.", "Hydrophilic": "Water-loving; molecules that dissolve readily in water.", "Peptide bond": "The covalent bond between two amino acids.", "Double helix": "The spiral shape of native DNA." },
    "Chapter 4": { "Cell theory": "The theory that all living things are composed of cells and cells come from other cells.", "Plasma membrane": "A selective barrier regulating the cell's chemical composition.", "Cytosol": "The semifluid portion of the cytoplasm.", "Nucleus": "The genetic control center containing the cell's DNA.", "Phospholipid bilayer": "A double layer of phospholipids forming plasma membranes.", "Fluid mosaic": "Model of membrane structure as a mosaic of proteins in a fluid lipid bilayer.", "Extracellular matrix": "Meshwork surrounding animal cells made of glycoproteins.", "Endoplasmic reticulum": "Membranous network continuous with the nuclear membrane.", "Golgi apparatus": "Organelle that modifies, stores, and ships ER products.", "Cytoskeleton": "Protein fiber network in the cytoplasm.", "Flagella": "Long appendages for locomotion.", "Cilia": "Short appendages for movement." },
    "Chapter 5": { "Calorie": "Energy raising 1g of water by 1°C.", "ATP": "Adenosine triphosphate; main energy source for cells.", "Enzymes": "Proteins serving as biological catalysts.", "Metabolism": "Total of all chemical reactions in an organism.", "Activation energy": "Energy absorbed to start a reaction.", "Induced fit": "Change in enzyme shape for snug substrate binding.", "Enzyme inhibitors": "Chemicals interfering with enzyme activity.", "Facilitated diffusion": "Passage through transport proteins down a gradient.", "Osmosis": "Diffusion of water across a membrane.", "Active transport": "Movement against a gradient requiring ATP." },
    "Chapter 6": { "Photosynthesis": "Transforming light energy into chemical energy in sugars.", "Autotroph": "Organism making its own food.", "Heterotroph": "Organism consuming others for food.", "Cellular respiration": "Aerobic harvest of energy from fuel molecules.", "Glycolysis": "First stage of respiration splitting glucose.", "Citric acid cycle": "Second stage of respiration breaking down glucose.", "Electron transport": "Final stage releasing energy to make ATP.", "Electron transport chain": "Series of carrier molecules shuttling electrons.", "ATP synthase": "Enzyme using ion gradient to make ATP.", "Fermentation": "Anaerobic harvest of food energy." },
    "Chapter 7": { "Chloroplast": "Organelle absorbing sunlight for photosynthesis.", "Stomata": "Pores for CO2 entry and O2/water exit.", "Stroma": "Thick fluid inside chloroplast.", "Thylakoids": "Membranous sacs containing chlorophyll.", "Light reaction": "Solar energy conversion to ATP/NADPH.", "Calvin cycle": "Using CO2 and ATP/NADPH to make sugar.", "NADPH": "Electron carrier in photosynthesis.", "Electromagnetic spectrum": "Full range of radiation wavelengths.", "Photon": "A fixed quantity of light energy." },
    "Chapter 8": { "Chromosome": "Gene-carrying structure in the nucleus.", "Asexual reproduction": "Creation of identical offspring by one parent.", "Clone": "Genetically identical copy.", "Gamete": "A sex cell (egg/sperm).", "Chromatin": "DNA-protein combination in chromosomes.", "Histone": "Protein associated with DNA packing.", "Nucleosome": "DNA wound around histone core.", "Centromere": "Region joining sister chromatids.", "Cell cycle": "Sequence of events from cell formation to division.", "Mitosis": "Division into two identical nuclei.", "Cytokinesis": "Cytoplasm division.", "Metastasis": "Spread of cancer cells." },
    "Chapter 9": { "Character": "Heritable feature like flower color.", "Trait": "Variant of a character.", "Hybrid": "Offspring of two different variants.", "Cross": "Mating experiment.", "Homozygous": "Two identical alleles.", "Heterozygous": "Two different alleles.", "Dominant allele": "Determines phenotype in heterozygote.", "Recessive allele": "No noticeable effect in heterozygote.", "Punnett square": "Diagram for inheritance results.", "Phenotype": "Expressed traits.", "Genotype": "Genetic makeup.", "Test cross": "Mating with homozygous recessive.", "Codominance": "Heterozygote expresses both alleles.", "Pleiotropy": "One gene affecting many traits.", "Polygenic inheritance": "Many genes affecting one trait.", "Epigenetic inheritance": "Traits transmitted without DNA sequence change." },
    "Chapter 10": { "DNA polymerase": "Enzyme assembling DNA nucleotides.", "Transcription": "Synthesis of RNA on a DNA template.", "Translation": "Synthesis of polypeptide using mRNA info.", "Codon": "Three-nucleotide mRNA sequence.", "Genetic code": "Rules for RNA-amino acid correspondence.", "RNA polymerase": "Enzyme linking RNA chain.", "Promoter": "DNA start site for transcription." },
    "Chapter 11": { "Operon": "Prokaryotic unit of genetic regulation.", "Transcription factors": "Proteins initiating transcription.", "Enhancer": "DNA sequence stimulating transcription.", "Alternative RNA splicing": "Producing different mRNAs from one transcript.", "microRNAs": "Small RNAs degrading mRNA.", "RNA interference": "Silencing specific genes.", "Signal transduction pathway": "Converting surface signals to internal responses.", "Homeotic genes": "Master control genes for body identity.", "DNA microarray": "Detecting expression of many genes.", "Complementary DNAs (cDNAs)": "DNA made from mRNA template.", "Nuclear transplantation": "Placing nucleus into another cell.", "Reproductive cloning": "Creating identical individuals.", "Embryonic stem cell": "Cell giving rise to specialized types.", "Oncogene": "Cancer-causing gene.", "Tumor-suppressor genes": "Inhibiting cell division." },
    "Chapter 12": { "Genetically modified organisms": "Acquiring genes by artificial means.", "Transgenic organism": "Contains genes from another species.", "Recombinant DNA": "DNA from two or more sources.", "Plasmids": "Self-replicating DNA ring vectors.", "DNA cloning": "Identical copies of DNA segment.", "Restriction enzyme": "Enzyme cutting foreign DNA.", "DNA ligase": "Enzyme bonding DNA strands.", "CRISPR-Cas9 system": "Technique for editing living cell genes." }
};

let quizList = [];
let currentIdx = 0;
let wrongNotes = [];
let isReviewQuiz = false;

function init() {
    const vocabBox = document.getElementById('vocab-content');
    const selectBox = document.getElementById('chapter-select-area');
    for (let chapter in data) {
        const div = document.createElement('div');
        div.className = 'chapter-box';
        div.innerHTML = `<button class="chapter-btn" onclick="this.nextElementSibling.classList.toggle('open')">${chapter} <span>▼</span></button>
            <div class="word-list">${Object.entries(data[chapter]).map(([w, d]) => `<div class="word-row"><b>${w}</b><small>${d}</small></div>`).join('')}</div>`;
        vocabBox.appendChild(div);
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" class="chap-chk" value="${chapter}"> ${chapter}`;
        selectBox.appendChild(label);
    }
    document.getElementById('user-answer').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter') {
            if(document.getElementById('submit-btn').style.display !== 'none') checkAnswer();
            else nextQuestion();
        }
    });
}

function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(el) el.classList.add('active');
    if(id === 'review-page') updateReviewPage();
}

function initQuiz(fromReview = false) {
    isReviewQuiz = fromReview;
    if (fromReview) {
        if (wrongNotes.length === 0) return alert("틀린 문제가 없습니다!");
        // 오답 리스트를 퀴즈용으로 변환
        quizList = wrongNotes.map(n => ({ q: n.q, a: n.a, ch: n.ch }));
        showPage('quiz-page', document.querySelectorAll('.nav-item')[1]);
    } else {
        const selected = Array.from(document.querySelectorAll('.chap-chk:checked')).map(c => c.value);
        if (!selected.length) return alert("단원을 선택해주세요!");
        quizList = [];
        selected.forEach(ch => { for (let word in data[ch]) quizList.push({ q: data[ch][word], a: word, ch: ch }); });
    }
    
    quizList.sort(() => Math.random() - 0.5);
    currentIdx = 0;
    document.getElementById('quiz-setup').style.display = 'none';
    document.getElementById('quiz-run').style.display = 'block';
    renderQuestion();
}

function renderQuestion() {
    if (currentIdx >= quizList.length) return finishQuiz();
    const item = quizList[currentIdx];
    document.getElementById('progress-text').textContent = (isReviewQuiz ? "[오답 복습] " : "") + `Problem ${currentIdx + 1} / ${quizList.length}`;
    document.getElementById('q-text').textContent = item.q;
    document.getElementById('user-answer').value = "";
    document.getElementById('user-answer').disabled = false;
    document.getElementById('feedback-area').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'block';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('user-answer').focus();
}

function checkAnswer() {
    const userAns = document.getElementById('user-answer').value.trim().toLowerCase();
    const realAns = quizList[currentIdx].a.toLowerCase();
    const feedback = document.getElementById('feedback-area');
    feedback.style.display = 'block';

    if (userAns === realAns) {
        feedback.textContent = "Correct! ✨";
        feedback.className = "feedback correct";
        // 오답 퀴즈 중 정답을 맞히면 오답 노트에서 제거 (선택 사항)
        if(isReviewQuiz) {
            wrongNotes = wrongNotes.filter(n => n.a !== quizList[currentIdx].a);
        }
    } else {
        feedback.innerHTML = `Wrong! ❌ Answer: <b>${quizList[currentIdx].a}</b>`;
        feedback.className = "feedback wrong";
        
        // 이미 오답 노트에 있는지 확인 후 추가
        if (!wrongNotes.some(n => n.a === quizList[currentIdx].a)) {
            wrongNotes.push({ ch: quizList[currentIdx].ch, q: quizList[currentIdx].q, a: quizList[currentIdx].a, u: userAns || "(None)" });
        }
    }
    updateReviewCount();
    document.getElementById('user-answer').disabled = true;
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() { currentIdx++; renderQuestion(); }

function stopQuiz() {
    if(confirm("현재까지의 진행 상황을 종료하고 오답 노트로 이동할까요? (틀린 문제는 저장됩니다)")) {
        finishQuiz();
    }
}

function finishQuiz() {
    updateReviewPage();
    alert(isReviewQuiz ? "오답 복습이 끝났습니다!" : "퀴즈가 끝났습니다!");
    showPage('review-page', document.getElementById('nav-review'));
    document.getElementById('quiz-run').style.display = 'none';
    document.getElementById('quiz-setup').style.display = 'block';
}

function updateReviewCount() { 
    document.getElementById('nav-review').textContent = `Review (${wrongNotes.length})`; 
}

function updateReviewPage() {
    const container = document.getElementById('review-content');
    const actions = document.getElementById('review-actions');
    
    if (!wrongNotes.length) {
        container.innerHTML = "<p style='text-align:center; padding:50px; color:#999;'>틀린 문제가 없습니다. 완벽해요! 🎉</p>";
        actions.classList.add('hidden');
        return;
    }
    
    actions.classList.remove('hidden');
    let html = `<table><tr><th>Chapter</th><th>Question</th><th>Your Ans</th><th>Correct</th></tr>`;
    wrongNotes.forEach(n => { 
        html += `<tr><td>${n.ch}</td><td><small>${n.q}</small></td><td style="color:var(--danger)">${n.u}</td><td style="color:var(--primary)"><b>${n.a}</b></td></tr>`; 
    });
    container.innerHTML = html + `</table>`;
}

function clearWrongNotes() {
    if(confirm("오답 노트를 초기화하시겠습니까?")) {
        wrongNotes = [];
        updateReviewCount();
        updateReviewPage();
    }
}

init();
</script>
</body>
</html>
