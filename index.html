<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioMaster Pro V5 - Ultimate Edition</title>
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #2c3e50;
            --danger: #e74c3c;
            --accent: #3498db;
            --bg: #f4f7f6;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; line-height: 1.5; }
        
        nav { background: var(--secondary); display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-item { padding: 15px 25px; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-item:hover { background: #34495e; }
        .nav-item.active { background: var(--primary); }

        .container { max-width: 900px; margin: 30px auto; padding: 20px; }
        .page { display: none; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .page.active { display: block; animation: fadeIn 0.4s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .chapter-box { border: 1px solid #edf2f7; margin-bottom: 12px; border-radius: 12px; overflow: hidden; }
        .chapter-btn { width: 100%; padding: 18px; text-align: left; background: #fff; border: none; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; font-size: 1.1rem; color: var(--secondary); }
        .word-list { display: none; padding: 0 20px 20px; background: #fff; }
        .word-list.open { display: block; border-top: 1px solid #edf2f7; }
        .word-row { padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .word-row b { color: var(--primary); font-size: 1.15rem; display: block; margin-bottom: 4px; }
        .word-row small { color: #4a5568; display: block; line-height: 1.5; font-size: 0.95rem; }

        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .quiz-question { font-size: 1.3rem; font-weight: 600; margin: 25px 0; min-height: 110px; color: #1a202c; line-height: 1.6; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 1.1rem; outline: none; transition: 0.2s; }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.1); }
        
        .feedback { margin: 20px 0; padding: 15px; border-radius: 10px; display: none; font-weight: bold; }
        .feedback.correct { display: block; background: #f0fff4; color: #276749; border: 1px solid #c6f6d5; }
        .feedback.wrong { display: block; background: #fff5f5; color: #9b2c2c; border: 1px solid #fed7d7; }

        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { border: 1px solid #e2e8f0; padding: 14px; text-align: left; }
        th { background: #f8fafc; font-size: 0.9rem; color: #718096; }

        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-stop { background: white; color: var(--danger); border: 2px solid var(--danger); }
        .btn-accent { background: var(--accent); color: white; width: 100%; margin-top: 10px; }
        .btn-danger { background: var(--danger); color: white; }

        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <div class="nav-item active" onclick="showPage('vocab-page', this)">Dictionary</div>
    <div class="nav-item" onclick="showPage('quiz-page', this)">Live Quiz</div>
    <div id="nav-review" class="nav-item" onclick="showPage('review-page', this)">Review (0)</div>
</nav>

<div class="container">
    <div id="vocab-page" class="page active">
        <h2 style="color:var(--primary)">🌿 Biology Dictionary (Advanced)</h2>
        <div id="vocab-content"></div>
    </div>

    <div id="quiz-page" class="page">
        <div id="quiz-setup">
            <h2>🧠 Quiz Setup</h2>
            <p>테스트할 단원을 선택하세요:</p>
            <div id="chapter-select-area" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:10px; margin:20px 0;"></div>
            <button class="btn btn-primary" onclick="initQuiz(false)">선택 단원 퀴즈 시작</button>
        </div>

        <div id="quiz-run" style="display:none;">
            <div class="quiz-header">
                <span id="progress-text" style="font-weight:bold; color:var(--secondary)">Problem 1 / 10</span>
                <button class="btn btn-stop" onclick="stopQuiz()">퀴즈 중단 & 오답 저장</button>
            </div>
            <div class="quiz-question" id="q-text"></div>
            <input type="text" id="user-answer" placeholder="영단어를 입력하세요..." autocomplete="off">
            <div id="feedback-area" class="feedback"></div>
            <button id="submit-btn" class="btn btn-primary" onclick="checkAnswer()">정답 확인 (Enter)</button>
            <button id="next-btn" class="btn btn-primary" style="display:none; background:var(--secondary);" onclick="nextQuestion()">다음 문제 ▶</button>
        </div>
    </div>

    <div id="review-page" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0">❌ Incorrect Notes</h2>
            <button class="btn btn-danger" onclick="clearWrongNotes()">초기화</button>
        </div>
        
        <div id="review-actions" class="hidden">
            <button class="btn btn-accent" onclick="initQuiz(true)">🔥 오답들만 모아서 다시 퀴즈 풀기</button>
        </div>

        <div id="review-content" class="table-wrapper">
            <p style="text-align:center; padding:50px; color:#999;">틀린 문제가 없습니다.</p>
        </div>
    </div>
</div>

<script>
const data = {
    "Chapter 1": {

        "Theory": "A comprehensive and well-substantiated explanation of some aspect of the natural world based on a body of evidence.",

    },
    "Chapter 3": {
        "Functional groups": "Specific configurations of atoms attached to carbon skeletons that participate in chemical reactions and determine properties.",
        "Hydrolysis": "A chemical process that breaks bonds between two molecules by adding a water molecule; essential for polymer breakdown.",
        "Dehydration reaction": "A chemical reaction in which two molecules are covalently bonded with the removal of a water molecule to form polymers.",
        "Isomer": "Organic compounds with the same molecular formula but different structural arrangements and properties.",
        "Glycogen": "An extensively branched glucose storage polysaccharide found in liver and muscle cells of animals.",
        "Hydrophobic": "Refers to nonpolar molecules that do not dissolve in water; 'water-fearing'.",
        "Hydrophilic": "Refers to polar or charged molecules that dissolve readily in water; 'water-loving'.",

        "Double helix": "The spiral shape of native DNA, consisting of two polynucleotide strands wound around each other."
    },
    "Chapter 4": {
        "Cell theory": "Fundamental theory stating that all living things are composed of cells and all cells arise from pre-existing cells.",
        "Plasma membrane": "A selectively permeable phospholipid bilayer that regulates the flow of materials into and out of the cell.",
        "Cytosol": "The semifluid, jelly-like portion of the cytoplasm in which organelles and other components are suspended.",
        "Nucleus": "The genetic control center of a eukaryotic cell, containing most of the cell's DNA organized into chromosomes.",
        "Phospholipid bilayer": "A double layer of phospholipids that forms the primary structural component of biological membranes.",
        "Fluid mosaic": "Description of membrane structure as diverse protein molecules embedded in a fluid phospholipid bilayer.",
        "Extracellular matrix": "A meshwork of glycoproteins and polysaccharides secreted by animal cells to provide structural support and signaling.",
        "Endoplasmic reticulum": "An extensive membranous network continuous with the nuclear envelope, involved in protein and lipid synthesis.",
        "Golgi apparatus": "An organelle consisting of stacks of membranous sacs that modify, store, and ship products from the ER.",
        "Cytoskeleton": "A network of protein fibers (microtubules, filaments) that maintains cell shape and enables movement.",

    "Chapter 5": {

        "Facilitated diffusion": "Passage of a substance across a biological membrane through specific transport proteins down its concentration gradient.",
        "Osmosis": "The passive diffusion of free water across a selectively permeable membrane to equalize solute concentrations.",
        "Active transport": "The movement of a substance across a biological membrane against its concentration gradient, requiring energy (ATP)."
    },
    "Chapter 6": {
        "Photosynthesis": "The anabolic process by which autotrophs convert light energy into chemical energy stored in glucose, using CO2 and water.",
        "Autotroph": "An organism that produces its own organic nutrients from inorganic substances; the primary producers in ecosystems.",
        "Heterotroph": "An organism that cannot synthesize its own food and must obtain energy by consuming other organisms or organic matter.",
        "Cellular respiration": "The aerobic catabolic process that harvests chemical energy from organic fuel molecules, producing ATP, CO2, and water.",
        "Glycolysis": "The first stage of cellular respiration occurring in the cytosol, splitting one glucose into 두 pyruvate molecules.",
        "Citric acid cycle": "The metabolic cycle in the mitochondrial matrix that completes the breakdown of glucose by oxidizing acetyl CoA to CO2.",
        "Electron transport": "The movement of high-energy electrons through a series of membrane proteins to create a proton gradient for ATP production.",
        "Electron transport chain": "A sequence of electron carrier molecules that shuttle electrons, creating the energy used to pump H+ ions during oxidative phosphorylation.",
        "ATP synthase": "A complex membrane protein that functions like a molecular turbine, using a H+ gradient to synthesize ATP from ADP and phosphate.",
        "Fermentation": "The anaerobic alternative to cellular respiration that harvests energy from food without oxygen, typically producing lactic acid or ethanol."
    },
    "Chapter 7": {
        "Chloroplast": "The specialized organelle in plants and algae that houses the machinery for photosynthesis, including thylakoids and stroma.",
        "Stomata": "Microscopic pores on leaf surfaces that regulate gas exchange (CO2 in, O2 out) and water loss via transpiration.",
        "Stroma": "The thick fluid within the chloroplast's inner membrane that surrounds thylakoids; the site of the Calvin cycle.",
        "Thylakoids": "Membranous sacs inside chloroplasts containing chlorophyll; the site where light energy is converted to chemical energy.",
        "Light reaction": "The first stage of photosynthesis where solar energy is absorbed by pigments and converted into the chemical energy of ATP and NADPH.",
        "Calvin cycle": "The second stage of photosynthesis occurring in the stroma, using CO2 and energy from light reactions to synthesize G3P (sugar).",
        "NADPH": "An electron carrier that provides high-energy electrons for the reduction of carbon compounds during the Calvin cycle.",
        "Electromagnetic spectrum": "The full range of radiation wavelengths, from high-energy gamma rays to low-energy radio waves, including visible light.",
        "Photon": "A discrete packet of light energy; the energy of a photon is inversely proportional to the wavelength of the light."
    },
    "Chapter 8": {
        "Chromosome": "A thread-like structure of nucleic acids and protein found in the nucleus, carrying genetic information in the form of genes.",
        "Asexual reproduction": "The production of genetically identical offspring from a single parent without the fusion of gametes.",
        "Clone": "An organism or cell produced asexually from one ancestor, to which they are genetically identical.",
        "Gamete": "A haploid reproductive cell (sperm or egg) that unites with another during sexual reproduction to form a diploid zygote.",
        "Chromatin": "The complex of DNA and histone proteins that makes up eukaryotic chromosomes; it exists in a dispersed form when the cell is not dividing.",
        "Histone": "A small protein with a high proportion of positively charged amino acids that binds to negatively charged DNA and aids in chromatin packing.",
        "Nucleosome": "The basic bead-like unit of DNA packing, consisting of a segment of DNA wound around a protein core of eight histones.",
        "Centromere": "The specialized DNA region of a chromosome where 두 sister chromatids are most closely attached and where spindle fibers bind.",

        "Metastasis": "The spread of cancer cells from their original site to distant parts of the body via the circulatory or lymphatic systems."
    },
    "Chapter 9": {
        "Character": "A heritable feature that varies among individuals, such as flower color or height.",
        "Trait": "A specific variant of a character, such as purple flowers or white flowers.",

        "Cross": "A controlled mating experiment between 두 individuals to observe the inheritance patterns of specific traits.",
        "Homozygous": "Having 두 identical alleles for a particular gene (e.g., AA or aa).",
        "Heterozygous": "Having 두 different alleles for a particular gene (e.g., Aa).",
        "Dominant allele": "An allele whose phenotypic effect is fully expressed in a heterozygote, masking the recessive allele.",
        "Recessive allele": "An allele whose phenotypic effect is not observed in a heterozygote; it is only expressed in a homozygous state.",
        "Punnett square": "A diagrammatic tool used to predict the allele composition of offspring from a cross between individuals of known genotype.",
        "Phenotype": "The observable physical and physiological traits of an organism, determined by its genetic makeup.",
        "Genotype": "The actual genetic makeup or set of alleles of an organism.",
        "Test cross": "Mating an individual of unknown genotype with a homozygous recessive individual to determine the unknown's genotype.",
        "Codominance": "A situation in which the phenotypes of both alleles are exhibited in the heterozygote because both alleles affect the phenotype in separate ways.",
        "Pleiotropy": "The ability of a single gene to have multiple phenotypic effects on an organism.",
        "Polygenic inheritance": "An additive effect of 두 or more genes on a single phenotypic character, such as human skin color.",
        "Epigenetic inheritance": "Inheritance of traits transmitted by mechanisms not directly involving the nucleotide sequence, such as DNA methylation."
    },
    "Chapter 10": {
        "DNA polymerase": "An enzyme that catalyzes the synthesis of new DNA by adding nucleotides to a preexisting chain, following base-pairing rules.",
        "Transcription": "The process by which the information in a strand of DNA is copied into a new molecule of messenger RNA (mRNA).",
        "Translation": "The synthesis of a polypeptide using the genetic information encoded in an mRNA molecule; occurs on ribosomes.",
        "Codon": "A three-nucleotide sequence in mRNA that specifies a particular amino acid or a termination signal during translation.",
        "Genetic code": "The universal set of rules by which information encoded in genetic material is translated into proteins by living cells.",
        "RNA polymerase": "An enzyme that pries the 두 strands of DNA apart and joins together RNA nucleotides complementary to the DNA template.",
        "Promoter": "A specific nucleotide sequence in the DNA of a gene that binds RNA polymerase, positioning it to start transcribing RNA."
    },
    "Chapter 11": {
        "Operon": "A unit of genetic function common in bacteria, consisting of coordinately regulated clusters of genes with related functions.",
        "Transcription factors": "Regulatory proteins that bind to DNA and affect the transcription of specific genes by assisting or inhibiting RNA polymerase.",

        "Homeotic genes": "Master regulatory genes that direct the development of particular body segments or structures in animals and plants.",
        "DNA microarray": "A tool used to monitor the expression of thousands of genes simultaneously by using nucleic acid hybridization.",
        "Complementary DNAs (cDNAs)": "Double-stranded DNA molecules made in vitro using mRNA as a template and the enzyme reverse transcriptase.",

    "Chapter 12": {
        "Genetically modified organisms": "Organisms that have had their genetic material altered using genetic engineering techniques, often involving the insertion of foreign DNA.",

        "Plasmids": "Small, circular, double-stranded DNA molecules that are distinct from a cell's chromosomal DNA; frequently used as vectors in cloning.",

    }
};

let quizList = [];
let currentIdx = 0;
let wrongNotes = [];
let isReviewQuiz = false;

function init() {
    const vocabBox = document.getElementById('vocab-content');
    const selectBox = document.getElementById('chapter-select-area');
    for (let chapter in data) {
        const div = document.createElement('div');
        div.className = 'chapter-box';
        div.innerHTML = `<button class="chapter-btn" onclick="this.nextElementSibling.classList.toggle('open')">${chapter} <span>▼</span></button>
            <div class="word-list">${Object.entries(data[chapter]).map(([w, d]) => `<div class="word-row"><b>${w}</b><small>${d}</small></div>`).join('')}</div>`;
        vocabBox.appendChild(div);
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" class="chap-chk" value="${chapter}"> ${chapter}`;
        selectBox.appendChild(label);
    }
    document.getElementById('user-answer').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter') {
            if(document.getElementById('submit-btn').style.display !== 'none') checkAnswer();
            else nextQuestion();
        }
    });
}

function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(el) el.classList.add('active');
    if(id === 'review-page') updateReviewPage();
}

function initQuiz(fromReview = false) {
    isReviewQuiz = fromReview;
    if (fromReview) {
        if (wrongNotes.length === 0) return alert("틀린 문제가 없습니다!");
        quizList = wrongNotes.map(n => ({ q: n.q, a: n.a, ch: n.ch }));
        showPage('quiz-page', document.querySelectorAll('.nav-item')[1]);
    } else {
        const selected = Array.from(document.querySelectorAll('.chap-chk:checked')).map(c => c.value);
        if (!selected.length) return alert("단원을 선택해주세요!");
        quizList = [];
        selected.forEach(ch => { for (let word in data[ch]) quizList.push({ q: data[ch][word], a: word, ch: ch }); });
    }
    
    quizList.sort(() => Math.random() - 0.5);
    currentIdx = 0;
    document.getElementById('quiz-setup').style.display = 'none';
    document.getElementById('quiz-run').style.display = 'block';
    renderQuestion();
}

function renderQuestion() {
    if (currentIdx >= quizList.length) return finishQuiz();
    const item = quizList[currentIdx];
    document.getElementById('progress-text').textContent = (isReviewQuiz ? "[오답 복습] " : "") + `Problem ${currentIdx + 1} / ${quizList.length}`;
    document.getElementById('q-text').textContent = item.q;
    document.getElementById('user-answer').value = "";
    document.getElementById('user-answer').disabled = false;
    document.getElementById('feedback-area').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'block';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('user-answer').focus();
}

function checkAnswer() {
    const userAns = document.getElementById('user-answer').value.trim().toLowerCase();
    const realAns = quizList[currentIdx].a.toLowerCase();
    const feedback = document.getElementById('feedback-area');
    feedback.style.display = 'block';

    if (userAns === realAns) {
        feedback.textContent = "Correct! ✨";
        feedback.className = "feedback correct";
        if(isReviewQuiz) {
            wrongNotes = wrongNotes.filter(n => n.a.toLowerCase() !== realAns);
        }
    } else {
        feedback.innerHTML = `Wrong! ❌ Answer: <b>${quizList[currentIdx].a}</b>`;
        feedback.className = "feedback wrong";
        if (!wrongNotes.some(n => n.a.toLowerCase() === realAns)) {
            wrongNotes.push({ ch: quizList[currentIdx].ch, q: quizList[currentIdx].q, a: quizList[currentIdx].a, u: userAns || "(None)" });
        }
    }
    updateReviewCount();
    document.getElementById('user-answer').disabled = true;
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() { currentIdx++; renderQuestion(); }

function stopQuiz() {
    if(confirm("현재까지 틀린 문제를 저장하고 퀴즈를 중단할까요?")) finishQuiz();
}

function finishQuiz() {
    updateReviewPage();
    alert(isReviewQuiz ? "오답 복습 완료!" : "퀴즈 완료!");
    showPage('review-page', document.getElementById('nav-review'));
    document.getElementById('quiz-run').style.display = 'none';
    document.getElementById('quiz-setup').style.display = 'block';
}

function updateReviewCount() { 
    document.getElementById('nav-review').textContent = `Review (${wrongNotes.length})`; 
}

function updateReviewPage() {
    const container = document.getElementById('review-content');
    const actions = document.getElementById('review-actions');
    if (!wrongNotes.length) {
        container.innerHTML = "<p style='text-align:center; padding:50px; color:#999;'>틀린 문제가 없습니다. 완벽해요! 🎉</p>";
        actions.classList.add('hidden');
        return;
    }
    actions.classList.remove('hidden');
    let html = `<table><tr><th>Chapter</th><th>Question</th><th>Your Ans</th><th>Correct</th></tr>`;
    wrongNotes.forEach(n => { 
        html += `<tr><td>${n.ch}</td><td><small>${n.q}</small></td><td style="color:var(--danger)">${n.u}</td><td style="color:var(--primary)"><b>${n.a}</b></td></tr>`; 
    });
    container.innerHTML = html + `</table>`;
}

function clearWrongNotes() {
    if(confirm("오답 노트를 초기화하시겠습니까?")) {
        wrongNotes = [];

}

init();
